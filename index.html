<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso de Assets | WorkinStore</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.25rem; color: #1e293b; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Acesso de Assets</h1>
        <form id="assetForm">
            <input type="text" id="directory" placeholder="Nome do diretório (ex: capas)" required>
            <button type="submit">Acessar</button>
        </form>
    </div>

    <script>
        const BASE_URL = "https://assets.workinstore.org";

        document.getElementById('assetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const dir = document.getElementById('directory').value.trim();
            if (dir) {
                window.location.href = `${BASE_URL}/${dir}`;
            }
        });
    </script>
</body>
</html>
