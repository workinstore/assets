
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivos de ROM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">Pesquise o código da ROM</h1>
            <input type="text" id="search" onkeyup="filter()" placeholder="Buscar arquivos..." class="w-full p-4 rounded-2xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
        </div>
        
        <div id="list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        
        <div id="pagination" class="mt-10 flex flex-wrap justify-center gap-2"></div>
    </div>

    <script>
        const data = [{"name":"AKEC","url":"assets.workinstore.org/roms/AKEC.smd"},{"name":"ALA","url":"assets.workinstore.org/roms/ALA.smd"},{"name":"ASSM","url":"assets.workinstore.org/roms/ASSM.smd"},{"name":"BOB","url":"assets.workinstore.org/roms/BOB.sfc"},{"name":"BOMB","url":"assets.workinstore.org/roms/BOMB.sfc"},{"name":"DBAA","url":"assets.workinstore.org/roms/DBAA.gba"},{"name":"DONK1","url":"assets.workinstore.org/roms/DONK1.sfc"},{"name":"MJM","url":"assets.workinstore.org/roms/MJM.smd"},{"name":"MLSS","url":"assets.workinstore.org/roms/MLSS.gba"},{"name":"MMPR","url":"assets.workinstore.org/roms/MMPR.sfc"},{"name":"MMPRM","url":"assets.workinstore.org/roms/MMPRM.sfc"},{"name":"MSA","url":"assets.workinstore.org/roms/MSA.gba"},{"name":"QS","url":"assets.workinstore.org/roms/QS.smd"},{"name":"SMAS","url":"assets.workinstore.org/roms/SMAS.sfc"},{"name":"SMB","url":"assets.workinstore.org/roms/SMB.nes"},{"name":"SMW","url":"assets.workinstore.org/roms/SMW.sfc"},{"name":"SON","url":"assets.workinstore.org/roms/SON.smd"},{"name":"SR","url":"assets.workinstore.org/roms/SR.smd"},{"name":"SSFII","url":"assets.workinstore.org/roms/SSFII.sfc"},{"name":"TKFEX2","url":"assets.workinstore.org/roms/TKFEX2.gba"},{"name":"TLK","url":"assets.workinstore.org/roms/TLK.sfc"},{"name":"TLZ","url":"assets.workinstore.org/roms/TLZ.sfc"}];
        let page = 1; const perPage = 30;
        
        function render(filtered = data) {
            const list = document.getElementById('list');
            const pagDiv = document.getElementById('pagination');
            
            list.innerHTML = filtered.slice((page-1)*perPage, page*perPage).map(i => 
                `<a href="${i.url}" download class="p-4 bg-white border border-gray-200 rounded-xl shadow-sm hover:border-blue-500 hover:shadow-md transition text-gray-700 truncate block text-center font-medium">${i.name}</a>`
            ).join('');
            
            const pages = Math.ceil(filtered.length/perPage);
            pagDiv.innerHTML = Array.from({length: pages}, (_, i) => 
                `<button onclick="page=${i+1}; render()" class="px-5 py-2 ${page === i+1 ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'} border rounded-lg shadow-sm font-semibold">${i+1}</button>`
            ).join('');
        }
        
        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            page = 1; render(data.filter(i => i.name.toLowerCase().includes(q)));
        }
        render();
    </script>
</body>
</html>
